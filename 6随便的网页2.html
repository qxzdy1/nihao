<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<link rel="stylesheet" href="css/css6.css">
		
	</head>
	<body>
		<div class="container">
			<h2>个人信息采集表</h2>
			<form id="infoForm">
				<div class="form-item">
					<label class="form-label">姓名：</label>
					<input type="text" class="form-input" id="name" placeholder="请输入姓名">
					<span class="erroe-tip" id="nameTip">姓名不能为空</span>
				</div>
				<div class="form-item">
					<label class="form-label">性别：</label>
					<div class="radio-group">
						<label class="radio-item">
							<input type="radio" name="gender" value="男" checked>男
						</label>
						<label class="radio-item">
							<input type="radio" name="gender" value="女" checked>女
						</label>
					</div>
				</div>
				<div class="form-item">
					<label class="form-label">籍贯：</label>
					<select class="form-input" id="hometown">
						<option value="辽宁省">辽宁省</option>
						<option value="黑龙江省">黑龙江省</option>
						<option value="吉林省">吉林省</option>
						<option value="北京市">北京市</option>
					</select>
				</div>
				<div class="form-item">
					<label class="form-label">电子邮箱：</label>
					<input type="text" class="form-input" id="email" placeholder="请输入电子邮箱">
					<span class="error-tip" id="emailTip">请输入有效的电子邮箱(必须包含@和.)</span>
				</div>
				<div class="form-item">
					<label class="form-label">个人简介:</label>
					<textarea class="form-input" id="intro" placeholder="请输入个人简介"></textarea>
				</div>
				<button type="button" class="btn" id="saveBtn">保存信息</button>
			</form>
			
			<div class="info-summary" id="summary">
				<h3>您提交的信息如下：</h3>
				<div class="info-item"><span>姓名:</span><span id="showName"></span></div>
				<div class="info-item"><span>性别:</span><span id="showGender"></span></div>
				<div class="info-item"><span>籍贯:</span><span id="showHometown"></span></div>
				<div class="info-item"><span>电子邮箱:</span><span id="showEmail"></span></div>
				<div class="info-item"><span>个人简介:</span><span id="showIntro"></span></div>
			</div>
		</div>
		
		<script>
			const saveBtn=document.getElementById('saveBtn');
			const nameInput=document.getElementById('name');
			const emailInput=document.getElementById('email');
			const introInput=document.getElementById('intro');
			const hometownSelect=document.getElementById('hometown');
			const nameTip=document.geElementById('nameTip');
			const emailTip=document.getElementById('emailTip');
			const summary=document.getElementById('summary');
			
			saveBtn.addEventListener('click',function({
				nameTip.style.display='none';
				emailTip.style.display='none';
				let isPass=true;
				const name=nameInput.value.trim();
				if(name===""){
					nameTip.style.display='block';
					isPass=false;
				}
				const email=emailInput.value.trim();
				if(!email.includes('@')||!email.includes('.')){
					emailTip.style.display='block';
					isPass=false;
				}
				if(isPass){
					const gender=document.querySelector('input[name="gender"]:checked').value;
					const hometown=hometownSelect.value;
					const intro=introInput.value.trim()||'暂无';
					
					document.getElementById("showName").textContent=name;
					document.getElementById("showGender").textContent=gender;
					document.getElementById("showHometown").textContent=hometown;
					document.getElementById("showEmail").textContent=email;
					document.getElementById("showIntro").textContent=intro;
					summary.style.display="block";
				}
				
			}))
		</script>
	</body>
</html>
